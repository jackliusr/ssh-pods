apiVersion: v1
kind: Pod
metadata:
  name: ssh-client
  labels:
    app: ssh-client
spec:
  containers:
    - name: ssh-client
      image: alpine:3.20
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          apk add --no-cache openssh
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          tail -f /dev/null
      volumeMounts:
        - name: ssh-private-key
          mountPath: /root/.ssh/id_rsa
          subPath: id_rsa
          readOnly: true
  volumes:
    - name: ssh-private-key
      secret:
        secretName: ssh-rsa-keys
        items:
          - key: id_rsa
            path: id_rsa
        defaultMode: 0600
